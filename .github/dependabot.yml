version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: bun
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns:
          - "*"
  # Root npm lockfile (Playwright e2e tooling). Was unmonitored, so dev-tooling
  # advisories (http-proxy-middleware, uuid) never produced a bump PR.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm:
        patterns:
          - "*"
  # Composer (PHP backend). Was unmonitored — this is why the phpoffice/
  # phpspreadsheet CVE-2026-59931/2/3 advisory produced no bump PR and only
  # surfaced as a red composer-audit gate. Now covered.
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      composer:
        patterns:
          - "*"
