name: Docker Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '44 12 * * *'
  push:
    branches:
      - "main"
      - "v*"
    tags:
      - "v*.*.*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege by default; each caller job grants exactly the set the
# reusable's jobs request.
permissions: {}

jobs:
  # Production + E2E images. The `app` target's tag scheme (semver / branch /
  # sha / production / latest) is generated by docker/metadata-action inside
  # the reusable via metadata-images/-tags; `app-e2e` carries its own tags
  # from docker-bake.hcl. GIT_SHA/GIT_REF/BUILD_DATE are exported to the HCL
  # variable blocks in pre-build-command. Trivy scans the produced images on
  # push (skipped on PR validation builds, where push is off).
  build:
    uses: netresearch/.github/.github/workflows/build-container-bake.yml@main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      targets: app,app-e2e
      push: ${{ github.event_name != 'pull_request' }}
      metadata-images: ghcr.io/${{ github.repository }}
      metadata-tags: |
        type=schedule
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=sha
        type=raw,value=production,enable={{is_default_branch}}
        type=raw,value=latest,enable={{is_default_branch}}
      pre-build-command: |
        {
          echo "GIT_SHA=$GITHUB_SHA"
          echo "GIT_REF=$GITHUB_REF_NAME"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        } >> "$GITHUB_ENV"

  # Prod-like image with the Symfony profiler (admin-gated); operators switch
  # to it on demand — never the default deployment. Built ONLY on a tag push
  # (release) or manual dispatch so the deployed :profiling-<sha> tag is
  # stamped with the release ref deterministically (building it on main-push
  # too made both runs write the same tag, last-writer-wins). Its tags come
  # from docker-bake.hcl, so no metadata-action here.
  build-profiling:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    uses: netresearch/.github/.github/workflows/build-container-bake.yml@main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      targets: app-profiling
      push: true
      pre-build-command: |
        {
          echo "GIT_SHA=$GITHUB_SHA"
          echo "GIT_REF=$GITHUB_REF_NAME"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        } >> "$GITHUB_ENV"
