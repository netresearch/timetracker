name: CI

on:
  push:
    branches: ["main", "v4"]
  pull_request:
    branches: ["**"]
  # Nightly full run WITH code coverage (#624 S9). PR/push runs skip xdebug
  # coverage instrumentation so they don't pay its overhead on the critical path;
  # the schedule (and on-demand workflow_dispatch) re-collect it — with branch
  # coverage (phpunit.xml.dist branchCoverage=true → Cobertura) — off that path.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Supersede an in-flight run when new commits land on the same ref. Scoped to
# non-default refs so every main commit still gets a complete run (bisect
# granularity); PR force-push/rapid-push bursts stop competing for the runner
# pool, which is what inflates wall-clock under contention.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  frontend:
    name: Frontend (SolidJS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test (Vitest)
        run: bun run test

      - name: Build (Vite)
        run: bun run build

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Pull E2E image
        run: docker pull ghcr.io/netresearch/timetracker:e2e-${{ github.sha }} || docker pull ghcr.io/netresearch/timetracker:e2e || docker buildx bake app-e2e --load

      - name: Prepare directories
        run: |
          mkdir -p var/cache var/log vendor bin
          chmod -R 777 var bin vendor
          if [ ! -f phpstan.neon ] && [ -f phpstan.dist.neon ]; then cp phpstan.dist.neon phpstan.neon; fi

      # Persist the PHP static-analysis tool caches across runs so PHPStan runs
      # incrementally (cold ~148s -> warm ~87s). The app-e2e container runs as
      # root with umask 022, so the cache files it writes are 0644/0755
      # (world-readable) and the post-job save (running as the runner user) can
      # read them without a chmod. Restore before the tool steps; the dirs are
      # created on demand by each tool on a cold run.
      - name: Cache PHP static-analysis caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            var/cache/phpstan
            var/cache/rector
            var/phpstan-phpat
            var/.php-cs-fixer.cache
          # github.run_id is unique per run, so the primary key never hits and the
          # job always SAVES a fresh cache at the end (newest incremental state).
          # restore-keys prefix-matches and restores the most recent prior cache.
          # PHPStan (config+composer-salted result cache), Rector (config-salted
          # ChangedFilesDetector) and PHP-CS-Fixer all re-validate internally, so a
          # stale restore is safe — worst case they recompute the changed files.
          key: php-static-analysis-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            php-static-analysis-${{ runner.os }}-

      - name: Install PHP dependencies
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # --ignore-platform-req=php needed until laminas-ldap adds PHP 8.5 support
          docker compose run --rm app-e2e composer install --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Warmup Symfony cache
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm -e APP_ENV=dev app-e2e php bin/console cache:warmup --env=dev

      - name: Validate composer.json
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e composer validate --no-check-publish

      - name: Composer audit (security)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e composer audit --format=plain

      - name: Static analysis (PHPStan)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e php -d memory_limit=1G bin/phpstan analyze --no-progress

      - name: Architecture analysis (PHPat)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e php -d memory_limit=1G bin/phpstan analyze -c config/quality/phpat.neon --no-progress

      - name: Code style (PHP-CS-Fixer)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e php -d memory_limit=512M bin/php-cs-fixer fix --dry-run --diff

      - name: Rector (dry-run)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm app-e2e php -d memory_limit=1G bin/rector process src --config=config/quality/rector.php --dry-run

      - name: Lint Twig templates
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm -e XDEBUG_MODE=off app-e2e php bin/console lint:twig templates/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 30 min headroom for the nightly/dispatch coverage run: xdebug branch
    # coverage over the full unit suite is ~6x slower than a plain run (the PR
    # path, which skips coverage, finishes in ~90s well under this). See #624 S9.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Pull E2E image
        run: docker pull ghcr.io/netresearch/timetracker:e2e-${{ github.sha }} || docker pull ghcr.io/netresearch/timetracker:e2e || docker buildx bake app-e2e --load

      - name: Prepare directories
        run: |
          mkdir -p var/cache var/log var/coverage vendor bin
          chmod -R 777 var bin vendor
          if [ ! -f phpunit.xml ] && [ -f phpunit.xml.dist ]; then cp phpunit.xml.dist phpunit.xml; fi

      - name: Install PHP dependencies
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # --ignore-platform-req=php needed until laminas-ldap adds PHP 8.5 support
          docker compose run --rm app-e2e composer install --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Warmup Symfony cache
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm -e APP_ENV=test app-e2e php bin/console cache:warmup --env=test

      - name: Run unit tests
        env:
          COMPOSE_PROFILES: e2e
          # Coverage only on the nightly schedule / manual dispatch (#624 S9);
          # PR & push run without xdebug instrumentation. Cobertura carries the
          # branch coverage (phpunit.xml.dist branchCoverage=true) for Codecov.
          COVERAGE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: |
          if [ "$COVERAGE" = "1" ]; then
            docker compose run --rm -e APP_ENV=test -e XDEBUG_MODE=coverage app-e2e \
              php -d memory_limit=1G bin/phpunit --testsuite unit --coverage-cobertura var/coverage/unit.xml
          else
            docker compose run --rm -e APP_ENV=test -e XDEBUG_MODE=off app-e2e \
              php -d memory_limit=1G bin/phpunit --testsuite unit
          fi

      - name: Upload unit coverage to Codecov
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: var/coverage/unit.xml
          flags: unit
          fail_ci_if_error: false
          verbose: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # 25 min headroom for the nightly/dispatch coverage run (xdebug branch
    # coverage ~6x slower; measured ~700s). PR path skips coverage. See #624 S9.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Pull E2E image
        run: docker pull ghcr.io/netresearch/timetracker:e2e-${{ github.sha }} || docker pull ghcr.io/netresearch/timetracker:e2e || docker buildx bake app-e2e --load

      - name: Prepare config files and SQL
        run: |
          mkdir -p var/cache var/log var/coverage vendor bin
          chmod -R 777 var bin vendor
          if [ ! -f phpunit.xml ] && [ -f phpunit.xml.dist ]; then cp phpunit.xml.dist phpunit.xml; fi
          sed '1s/^/USE unittest;\\n/' sql/full.sql > sql/unittest/001_testtables.sql

      - name: Install PHP dependencies
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # --ignore-platform-req=php needed until laminas-ldap adds PHP 8.5 support
          docker compose run --rm app-e2e composer install --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Warmup Symfony cache
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose run --rm -e APP_ENV=test app-e2e php bin/console cache:warmup --env=test

      - name: Start test database
        env:
          COMPOSE_PROFILES: e2e
        run: |
          docker compose up -d db_unittest
          docker compose exec -T db_unittest mariadb-admin ping -h 127.0.0.1 -uroot -pglobal123 --wait --connect-timeout=60

      - name: Run integration tests
        env:
          COMPOSE_PROFILES: e2e
          # Coverage only on the nightly schedule / manual dispatch (#624 S9).
          COVERAGE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: |
          if [ "$COVERAGE" = "1" ]; then
            docker compose run --rm -e APP_ENV=test -e XDEBUG_MODE=coverage app-e2e \
              php -d memory_limit=2G bin/phpunit --testsuite integration,controller,api-functional,mcp --coverage-cobertura var/coverage/integration.xml
          else
            docker compose run --rm -e APP_ENV=test -e XDEBUG_MODE=off app-e2e \
              php -d memory_limit=2G bin/phpunit --testsuite integration,controller,api-functional,mcp
          fi

      - name: Upload integration coverage to Codecov
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: var/coverage/integration.xml
          flags: integration
          fail_ci_if_error: false
          verbose: true

      - name: Stop database
        if: always()
        run: docker compose down

  e2e:
    name: E2E Tests (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Pull E2E image
        run: docker pull ghcr.io/netresearch/timetracker:e2e-${{ github.sha }} || docker pull ghcr.io/netresearch/timetracker:e2e || docker buildx bake app-e2e --load

      - name: Prepare directories
        run: |
          mkdir -p var/cache var/log var/coverage/e2e playwright-report test-results vendor bin node_modules
          chmod -R 777 var bin vendor node_modules public playwright-report test-results

      - name: Install PHP dependencies
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # --ignore-platform-req=php needed until laminas-ldap adds PHP 8.5 support
          docker compose run --rm app-e2e composer install --no-interaction --prefer-dist --ignore-platform-req=php

      - name: Build SolidJS UI assets (Vite)
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # The compose mount masks the image's frontend build, so build the
          # Vite app into the host-mounted public/build-ui that the E2E app serves.
          docker compose run --rm app-e2e sh -c 'cd frontend && bun install --frozen-lockfile && bun run build'

      - name: Reinstall npm binaries
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # Artifact download doesn't preserve npm binary symlinks, reinstall to fix
          docker compose run --rm app-e2e npm install --legacy-peer-deps

      - name: Start E2E stack
        env:
          COMPOSE_PROFILES: e2e
          # Coverage only on the nightly schedule / manual dispatch (#624 S9);
          # PR & push start the stack without xdebug coverage instrumentation.
          COVERAGE_ENABLED: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
          XDEBUG_MODE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'coverage' || 'off' }}
        run: |
          docker compose up -d

          # Wait for database
          docker compose exec -T db-e2e mariadb-admin ping -h 127.0.0.1 -uroot -pglobal123 --wait --connect-timeout=60

          # Clear and warmup Symfony cache for test environment
          docker compose exec -T app-e2e php bin/console cache:clear --env=test || true
          docker compose exec -T app-e2e php bin/console cache:warmup --env=test || true

          # Wait for app to be ready
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /tmp/response.html -w "%{http_code}" http://localhost:8766/login 2>&1)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "App is ready after $i attempts (HTTP $HTTP_CODE)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "App failed to start within timeout (last HTTP code: $HTTP_CODE)"
              echo "=== Last response body ==="
              cat /tmp/response.html 2>/dev/null | head -100 || true
              echo "=== PHP-FPM logs ==="
              docker compose logs app-e2e | tail -50
              echo "=== Nginx logs ==="
              docker compose logs httpd-e2e | tail -20
              exit 1
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, waiting..."
            sleep 3
          done

          # Verify coverage is enabled
          curl -s http://localhost:8766/coverage.php?action=status || echo "Coverage endpoint not responding"

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        env:
          COMPOSE_PROFILES: e2e
        run: |
          # Install playwright browsers in the same container as the test run; the prebuilt
          # image's baked browsers can be stale relative to the locked @playwright/test version,
          # and `docker compose run --rm` discards anything written to a separate container.
          docker compose run --rm \
            -e E2E_BASE_URL=http://httpd-e2e:80 \
            -e CI=true \
            app-e2e bash -c "npx playwright install chromium && npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} -x"

      - name: Collect E2E coverage
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        run: |
          curl -s "http://localhost:8766/coverage.php?action=report&format=clover" > var/coverage/e2e-clover-${{ matrix.shard }}.xml || true
          if [ -s var/coverage/e2e-clover-${{ matrix.shard }}.xml ]; then
            echo "E2E coverage collected successfully for shard ${{ matrix.shard }}"
          else
            echo "No E2E coverage data collected for shard ${{ matrix.shard }}"
          fi

      - name: Upload E2E coverage to Codecov
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: var/coverage/e2e-clover-${{ matrix.shard }}.xml
          flags: e2e
          fail_ci_if_error: false
          verbose: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
            var/coverage/
          retention-days: 7

      - name: Stop E2E stack
        if: always()
        env:
          COMPOSE_PROFILES: e2e
        run: docker compose down

  # Single aggregate gate: green only when every job above succeeded. Lets branch
  # protection require one check ("CI Success") instead of enumerating all jobs +
  # the e2e shard names (whose count is the strategy matrix size).
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always()
    needs: [frontend, lint, test-unit, test-integration, e2e]
    steps:
      - name: Verify all jobs succeeded
        # Pass the results through env (never interpolate ${{ }} into the shell —
        # that would be a script-injection sink).
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Upstream job results: $RESULTS"
          case "$RESULTS" in
            *failure*|*cancelled*)
              echo "::error::A CI job failed or was cancelled."
              exit 1
              ;;
          esac
          echo "All CI jobs succeeded."
