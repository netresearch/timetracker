# config/routes.yaml
# Main routing configuration

# Unified login route
# Handles both GET (display form) and POST (authentication)
_login:
    path: /login
    controller: App\Controller\SecurityController::login
    methods: [GET, POST]

# Kept for clients and tests that still POST to /login_check
login_check:
    path: /login_check
    controller: App\Controller\SecurityController::login
    methods: POST

# Logout route
_logout:
    path: /logout
    controller: App\Controller\SecurityController::logout
    methods: GET

# Routes are primarily defined via PHP attributes (#[Route]) in controllers
