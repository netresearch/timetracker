security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
        ROLE_SUPER_ADMIN: [ROLE_USER, ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            provider: app_user_provider
            # Refuse login for deactivated accounts (users.active = 0).
            user_checker: App\Security\UserChecker
            lazy: true
            # Set entry point to form_login for multiple authenticators
            entry_point: form_login

            # Single authenticator routing per user (local password vs LDAP bind).
            custom_authenticators:
                - App\Security\LoginFormAuthenticator

            # Form login configuration for unified route
            form_login:
                login_path: _login
                check_path: _login
                enable_csrf: true

            # Throttle repeated login attempts per username+IP (offline-crackable
            # local hashes now exist; this also protects LDAP-account logins).
            login_throttling:
                max_attempts: 5

            # Second factor (ADR-018 D2, increment 3). Only challenges users with an
            # enrolled TOTP secret — everyone else logs in exactly as before. The
            # three handlers speak JSON to the SPA (fetch/XHR) and fall back to the
            # scheb-rendered /2fa form for no-JS clients. The check path
            # (/2fa_check) is firewall-intercepted, not a controller. CSRF stays off
            # here: the password step already validates the stateless 'authenticate'
            # token, and the code check is bound to the session's TwoFactorToken.
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                auth_code_parameter_name: _auth_code
                authentication_required_handler: App\Security\TwoFactor\TwoFactorJsonRequiredHandler
                success_handler: App\Security\TwoFactor\TwoFactorJsonSuccessHandler
                failure_handler: App\Security\TwoFactor\TwoFactorJsonFailureHandler

            # Standard logout configuration
            logout:
                path: _logout
                target: _login
                # Ensure any custom session data is cleared on logout
                invalidate_session: true
                # Stateless CSRF (framework.csrf_protection): the _csrf_token
                # that logout_path()/logout_url() append is validated via the
                # Sec-Fetch-Site/Origin/Referer headers of a same-origin
                # navigation — blocking cross-site forced logout.
                enable_csrf: true

            # Remember me functionality (uses Symfony's built-in feature)
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 30 days in seconds
                path: /
                secure: auto  # Auto-detect: secure over HTTPS, non-secure over HTTP

            # Enable user switching (impersonation)
            switch_user:
                parameter: simulateUserId
                role: ROLE_ALLOWED_TO_SWITCH

            # Passkey / WebAuthn login (ADR-018 D3). Sits alongside form_login as
            # an additional authenticator — it only claims the two ceremony paths
            # below, so password login is undisturbed. A passkey is inherently
            # two-factor, so it is not sent through the TOTP challenge (scheb keys
            # its trigger on token class; WebauthnToken is not listed).
            webauthn:
                user_provider: app_user_provider
                success_handler: App\Security\Webauthn\PasskeyLoginSuccessHandler
                failure_handler: App\Security\Webauthn\PasskeyLoginFailureHandler
                authentication:
                    profile: default
                    routes:
                        options_path: /login/options
                        result_path: /login/passkey

    # Access control settings
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/css, roles: PUBLIC_ACCESS }
        - { path: ^/js, roles: PUBLIC_ACCESS }
        - { path: ^/images, roles: PUBLIC_ACCESS }
        - { path: ^/status/check, roles: PUBLIC_ACCESS }
        - { path: ^/status/page, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Profiler/web-debug-toolbar routes exist only in the `profiling` env,
        # where the `dev` firewall is narrowed so these fall through to `main`;
        # lock them to admins. Inert in dev/test/prod (no such routes/firewall match).
        - { path: ^/_(profiler|wdt), roles: ROLE_ADMIN }
        # The 2FA form (/2fa) and code check (/2fa_check) are reached while the
        # login is half-done — the catch-all's IS_AUTHENTICATED_FULLY would block
        # them, so allow the in-progress state explicitly (must precede ^/).
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

        # Uncomment to restrict access to paths starting with /_internal to only localhost
        # - { path: ^/_internal/secure, roles: IS_AUTHENTICATED_ANONYMOUSLY, ip: 127.0.0.1 }
        # - { path: ^/_internal/secure, roles: ROLE_NO_ACCESS }
