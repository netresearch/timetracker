# Vite integration for the new SolidJS frontend (frontend/).
# The legacy ExtJS app keeps using plain asset() tags + Webpack Encore copyFiles;
# everything new is built by Vite into public/build-ui — deliberately OUTSIDE
# public/build, which Encore's cleanupOutputBeforeBuild() wipes.
pentatrion_vite:
    public_directory: public
    build_directory: build-ui
