security:
    # Cheap password hashing in tests (#624 QW4): bcrypt cost 4 keeps the $2y$
    # format the fixtures rely on (password_hash(..., PASSWORD_DEFAULT)) while
    # cutting per-hash cost — the default 'auto' (Argon2id) dominated the run.
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 4

    firewalls:
        main:
            # Complete override for test environment
            provider: app_user_provider
            lazy: true
            # Use form_login in tests to support redirects
            form_login:
                login_path: _login
                check_path: _login
                default_target_path: /
            # Set form_login as the entry point for redirects
            entry_point: form_login
            # Note: remember_me disabled by omission in test environment
            logout:
                path: _logout
                target: _login
            # Mirror the production two_factor block (this file fully overrides the
            # main firewall) so the challenge flow is functionally testable. Inert
            # for the test fixtures' default state (no user has a TOTP secret).
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                auth_code_parameter_name: _auth_code
                authentication_required_handler: App\Security\TwoFactor\TwoFactorJsonRequiredHandler
                success_handler: App\Security\TwoFactor\TwoFactorJsonSuccessHandler
                failure_handler: App\Security\TwoFactor\TwoFactorJsonFailureHandler

