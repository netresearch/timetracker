# SonarCloud AutoScan analysis scope
#
# Vendored third-party code and generated/fixture SQL are not ours to fix;
# excluding them removes ~200 nonsensical security hotspots (regex
# backtracking warnings inside the bundled legacy ExtJS builds) and
# duplicate-literal noise from schema/fixture dumps.
# The whole assets/js tree is the legacy ExtJS frontend being strangled out by
# the SolidJS UI under frontend/; its findings are not worth fixing in
# code that is being removed, so exclude it from analysis entirely.
sonar.exclusions=assets/js/**,public/docs/swagger/**,sql/**,fixtures/**,public/build/**

# Rule-scoped suppressions for verified false positives that cannot be "fixed"
# without breaking behaviour or introducing a worse smell:
#  - php:S2003 on Kernel.php: `require config/bundles.php` returns the bundle
#    array and registerBundles() re-runs on every kernel reboot (functional
#    tests); require_once would return true on the 2nd boot and break it.
#  - php:S1848 in TokenEncryptionServiceTest: instantiating to assert the
#    constructor throws is the behaviour under test, not a dropped object;
#    S1848 fires on the bare `new` regardless of context.
#  - php:S836 in ExportServiceTest: dataflow false positive inside the Jira
#    API mock builder (the stdClass is initialised before use).
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S2003
sonar.issue.ignore.multicriteria.e1.resourceKey=src/Kernel.php
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1848
sonar.issue.ignore.multicriteria.e2.resourceKey=tests/Service/Security/TokenEncryptionServiceTest.php
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S836
sonar.issue.ignore.multicriteria.e3.resourceKey=tests/Service/ExportServiceTest.php
