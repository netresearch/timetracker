# typescript:S4325 — these non-null/`as` assertions are required by strict
# noUncheckedIndexedAccess and nullable DOM-query/return types; removing them
# breaks the type-check, so the assertions are not actually redundant here.
sonar.issue.ignore.multicriteria.e19.ruleKey=typescript:S4325
sonar.issue.ignore.multicriteria.e19.resourceKey=**/*
# docker:S7031 — the two RUN layers are deliberately separate concerns (base
