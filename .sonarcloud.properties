# SonarCloud AutoScan analysis scope
#
# Generated/fixture SQL and committed static assets are not ours to fix;
# excluding them removes duplicate-literal noise from schema/fixture dumps
# and findings in generated output.
sonar.exclusions=public/docs/swagger/**,sql/**,fixtures/**,public/build/**

# Rule-scoped suppressions for verified false positives that cannot be "fixed"
# without breaking behaviour or introducing a worse smell:
#  - php:S2003 on Kernel.php: `require config/bundles.php` returns the bundle
#    array and registerBundles() re-runs on every kernel reboot (functional
#    tests); require_once would return true on the 2nd boot and break it.
#  - php:S1848 in TokenEncryptionServiceTest: instantiating to assert the
#    constructor throws is the behaviour under test, not a dropped object;
#    S1848 fires on the bare `new` regardless of context.
#  - php:S836 in ExportServiceTest: dataflow false positive inside the Jira
#    API mock builder (the stdClass is initialised before use).
# Style choices: where SonarCloud enforces one of two equally-valid styles, we
# declare the project's chosen style here rather than churn the code:
#  - typescript:S7764 (prefer globalThis over window): this is a browser-only
#    SPA; `window` is correct and `lib/settings.ts` deliberately uses
#    `window.localStorage` to avoid Node 22's global-localStorage shadowing
#    under the test runner.
#  - typescript:S6759 (mark props read-only): Solid component props are reactive
#    accessors; the Readonly<> wrapper is a React convention not used here.
#  - typescript:S7718 (catch param must be `error_`): we name caught errors
#    `caught`/`error`.
#  - typescript:S3358 / php:S3358 (nested ternary): permitted as a concise style.
#  - php:S1155 (use empty()): we avoid empty()'s loose semantics in favour of
#    explicit count()/[] comparisons.
#  - php:S101 on migrations: Doctrine migration class names are tracked in the
#    migrations table; renaming risks re-running them.
#  - php:S1448 / php:S107 (class/method/param counts): cohesive services,
#    repositories, the interface stub and the bulk-entry action signature.
#  - php:S1313 (hardcoded IP): localhost (127.0.0.1) in dev/test LDAP config.
#  - php:S1135 (TODO comments): intentional tracked markers (INFO).
#  - typescript:S1301 (switch->if) in a test mock: the switch is clearer.
#
# False positives that cannot be "fixed" without breaking behaviour or a worse
# smell:
#  - php:S2003 on Kernel.php: `require config/bundles.php` returns the bundle
#    array and registerBundles() re-runs on every kernel reboot (functional
#    tests); require_once would return true on the 2nd boot and break it.
#  - php:S1848 in TokenEncryptionServiceTest: instantiating to assert the
#    constructor throws is the behaviour under test, not a dropped object.
#  - php:S836 in ExportServiceTest: dataflow false positive inside the Jira
#    API mock builder (the stdClass is initialised before use).
#
# Reviewed-safe by design:
#  - php:S5122 on Response.php: the API is intended to be freely consumed
#    cross-origin; the policy is GET/OPTIONS with no Allow-Credentials, so no
#    authenticated data is exposed (cookies are never sent cross-origin).
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14,e15,e16,e17,e18,e19,e20,e21,e22,e23
