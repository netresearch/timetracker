# Symfony validator violations translate via the 'validators' domain.
# Keys must match the exact message built in the DTO/entity constraints.
"Every user must belong to at least one team": "Каждый пользователь должен принадлежать хотя бы одной команде."
"Please provide a valid preset name with at least 3 letters.": "Укажите корректное имя пресета не менее чем из 3 символов."
"Please provide a valid date.": "Укажите корректную дату."
"Please provide a holiday name.": "Укажите название праздника."
"Please provide a valid project name with at least 3 letters.": "Укажите корректное название проекта не менее чем из 3 символов."
"The Jira prefix must contain only uppercase letters.": "Префикс Jira должен содержать только заглавные буквы."
"Please enter a valid contract start.": "Укажите корректную дату начала договора."
"Please provide a valid team name with at least 3 letters.": "Укажите корректное название команды не менее чем из 3 символов."
"Please provide a lead user for the team.": "Укажите руководителя команды."
"Please provide a valid ticket system name with at least 3 letters.": "Укажите корректное название системы тикетов не менее чем из 3 символов."
"Please provide a valid user name with at least 3 letters.": "Укажите корректное имя пользователя не менее чем из 3 символов."
"Date is required": "Дата обязательна"
"Start time is required": "Время начала обязательно"
"End time is required": "Время окончания обязательно"
"Ticket cannot be longer than 50 characters": "Тикет не может быть длиннее 50 символов"
"Invalid ticket format": "Неверный формат тикета"
"Description cannot be longer than 1000 characters": "Описание не может быть длиннее 1000 символов"
"Preset ID is required": "Идентификатор пресета обязателен"
"Please provide a valid customer name with at least 3 letters.": "Укажите корректное имя клиента не менее чем из 3 символов."
"Please provide a valid activity name with at least 3 letters.": "Укажите корректное название деятельности не менее чем из 3 символов."
"Factor must be greater than or equal to 0.": "Коэффициент должен быть больше или равен 0."
"Password must be at least 8 characters.": "Пароль должен содержать не менее 8 символов."
"Authentication source must be either local or LDAP.": "Источник аутентификации должен быть локальным или LDAP."
"An LDAP account has no local password — choose local authentication to set one.": "У LDAP-учётной записи нет локального пароля — выберите локальную аутентификацию, чтобы задать его."
