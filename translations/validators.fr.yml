# Symfony validator violations translate via the 'validators' domain.
# Keys must match the exact message built in the DTO/entity constraints.
"Every user must belong to at least one team": "Chaque utilisateur doit appartenir à au moins une équipe."
"Please provide a valid preset name with at least 3 letters.": "Indique un nom de préréglage valide d'au moins 3 caractères."
"Please provide a valid date.": "Indique une date valide."
"Please provide a holiday name.": "Indique un nom pour le jour férié."
"Please provide a valid project name with at least 3 letters.": "Indique un nom de projet valide d'au moins 3 caractères."
"The Jira prefix must contain only uppercase letters.": "Le préfixe Jira ne doit contenir que des majuscules."
"Please enter a valid contract start.": "Indique un début de contrat valide."
"Please provide a valid team name with at least 3 letters.": "Indique un nom d'équipe valide d'au moins 3 caractères."
"Please provide a lead user for the team.": "Indiquez un responsable pour l'équipe."
"Please provide a valid ticket system name with at least 3 letters.": "Indique un nom de système de tickets valide d'au moins 3 caractères."
"Please provide a valid user name with at least 3 letters.": "Indique un nom d'utilisateur valide d'au moins 3 caractères."
"Date is required": "La date est obligatoire"
"Start time is required": "L'heure de début est obligatoire"
"End time is required": "L'heure de fin est obligatoire"
"Ticket cannot be longer than 50 characters": "Le ticket ne peut pas dépasser 50 caractères"
"Invalid ticket format": "Format de ticket non valide"
"Description cannot be longer than 1000 characters": "La description ne peut pas dépasser 1000 caractères"
"Preset ID is required": "L'identifiant de préréglage est obligatoire"
"Please provide a valid customer name with at least 3 letters.": "Indique un nom de client valide d'au moins 3 caractères."
"Please provide a valid activity name with at least 3 letters.": "Indique un nom d'activité valide d'au moins 3 caractères."
"Factor must be greater than or equal to 0.": "Le facteur doit être supérieur ou égal à 0."
"Password must be at least 8 characters.": "Le mot de passe doit comporter au moins 8 caractères."
"Authentication source must be either local or LDAP.": "La source d'authentification doit être locale ou LDAP."
"An LDAP account has no local password — choose local authentication to set one.": "Un compte LDAP n'a pas de mot de passe local — choisissez l'authentification locale pour en définir un."
